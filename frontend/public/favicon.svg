<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>

  <!-- Glow ring -->
  <circle cx="50" cy="50" r="38" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Graduation cap - top flat part -->
  <polygon points="50,25 80,38 50,51 20,38" fill="url(#capGrad)" filter="url(#glow)"/>

  <!-- Cap top shine -->
  <polygon points="50,25 80,38 65,44.5 35,31.5" fill="#c084fc" fill-opacity="0.3"/>

  <!-- Cap body (head part) -->
  <path d="M35 42 L35 60 Q35 67 50 70 Q65 67 65 60 L65 42 L50 51 Z" fill="url(#capGrad)"/>

  <!-- Cap body shine -->
  <path d="M35 42 L35 50 Q35 54 50 57 L50 51 Z" fill="#c084fc" fill-opacity="0.25"/>

  <!-- Tassel string -->
  <line x1="80" y1="38" x2="80" y2="58" stroke="url(#shimmer)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tassel ball -->
  <circle cx="80" cy="61" r="4" fill="url(#shimmer)" filter="url(#glow)"/>

  <!-- Tassel lines -->
  <line x1="79" y1="65" x2="77" y2="73" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="65" x2="80" y2="74" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="81" y1="65" x2="83" y2="73" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
